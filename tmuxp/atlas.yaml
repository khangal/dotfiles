session_name: atlas

windows:
  - window_name: atlas
    panes:
      - shell_command:
          - cd ~/work/andex/atlas
          - pnpm run dev:meridian
      - shell_command:
          - cd ~/work/andex/atlas/
          - pnpm run dev:citadel
    layout: even-horizontal

  # -------------------------
  # Window 2: empty terminal
  # -------------------------
  - window_name: editor
    focus: true
    panes:
      - shell_command:
          - cd ~/work/andex/atlas/
          - opencode .
      - shell_command:
          - cd ~/work/andex/atlas/
          - nvim .
    layout: even-horizontal
